<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keheilan Admin – Secure Login</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Minimal overrides for admin login box */
        .admin-login-box {
            background: rgba(245,245,220,0.06);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(245,245,220,0.15);
            border-radius: 28px;
            padding: 48px 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 30px 70px rgba(0,0,0,0.5);
        }
        .admin-badge {
            text-align: center;
            margin-bottom: 30px;
        }
        .admin-badge span {
            display: inline-block;
            background: rgba(201,160,48,0.2);
            color: #c9a030;
            padding: 6px 18px;
            border-radius: 30px;
            font-size: 0.75rem;
            letter-spacing: 3px;
            font-weight: 700;
            border: 1px solid rgba(201,160,48,0.4);
        }
        .error-msg {
            color: var(--error);
            text-align: center;
            margin-bottom: 16px;
            font-size: 0.85rem;
            min-height: 20px;
        }
    </style>
</head>
<body>
    <div class="bg-anim">
        <div class="bg-orb"></div><div class="bg-orb"></div><div class="bg-orb"></div>
        <div class="particles"><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div>
    </div>
    <div class="cursor-glow" id="cursor-glow"></div>

    <div style="display: flex; align-items: center; justify-content: center; min-height: 100vh; position: relative; z-index: 2;">
        <div class="admin-login-box">
            <div class="admin-badge"><span>ADMINISTRATOR</span></div>
            <h2 style="font-family:'Playfair Display', serif; font-size: 2rem; color: var(--cream); text-align: center; margin-bottom: 28px;">Secure Access</h2>
            <div class="error-msg" id="error-msg"></div>
            <form id="admin-login-form">
                <div class="field">
                    <label for="admin-email">Admin Email</label>
                    <input type="email" id="admin-email" placeholder="admin@keheilan.com" required>
                </div>
                <div class="field">
                    <label for="admin-password">Password</label>
                    <input type="password" id="admin-password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary full">Authenticate</button>
            </form>
            <p style="text-align:center; margin-top:16px; opacity:0.5; font-size:0.8rem; color: var(--cream);">&copy; Keheilan Agricultural Intelligence</p>
        </div>
    </div>

    <script>
        const glow = document.getElementById('cursor-glow');
        let mx=0,my=0,gx=0,gy=0;
        document.addEventListener('mousemove', e => { mx=e.clientX; my=e.clientY; });
        (function anim(){ gx+=(mx-gx)*0.08; gy+=(my-gy)*0.08; glow.style.left=gx+'px'; glow.style.top=gy+'px'; requestAnimationFrame(anim); })();

        document.getElementById('admin-login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('admin-email').value.trim();
            const password = document.getElementById('admin-password').value;
            const error = document.getElementById('error-msg');
            error.textContent = '';

            try {
                const res = await fetch('/api/admin/login', {
                    method: 'POST',
                    headers: {'Content-Type':'application/json'},
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                if (data.success) {
                    window.location.href = '/admin/dashboard';
                } else {
                    error.textContent = data.message || 'Invalid credentials';
                }
            } catch (err) {
                error.textContent = 'Network error. Please try again.';
            }
        });
    </script>
</body>
</html>
